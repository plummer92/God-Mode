name: Deploy to God-Mode Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DEPLOY_DIR=/home/theplummer92/god-mode-sync
            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              git clone https://github.com/plummer92/God-Mode.git "${DEPLOY_DIR}"
            fi
            cd "${DEPLOY_DIR}"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            sudo cp systemd/*.service /etc/systemd/system/
            sudo cp systemd/*.timer /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable godmode.service
            sudo systemctl enable scheduled-reports.service
            sudo systemctl enable market-observer.timer
            sudo systemctl enable signal-outcomes.timer
            sudo systemctl enable strategy-lab-run.timer
            sudo systemctl disable sniper.service paper-sniper.service strategy-lab.service dashboard.service signal-outcomes.service || true
            sudo systemctl stop sniper.service paper-sniper.service strategy-lab.service dashboard.service signal-outcomes.service || true
            sudo systemctl restart godmode.service
            sudo systemctl restart scheduled-reports.service
            sudo systemctl restart market-observer.timer
            sudo systemctl restart signal-outcomes.timer
            sudo systemctl restart strategy-lab-run.timer
            echo "Deploy complete"
